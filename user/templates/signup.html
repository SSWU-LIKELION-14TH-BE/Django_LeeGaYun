<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
</head>
<body>
    <div class="signup-wrapper">
        <div class="signup-title">
            회원가입
        </div>
        <form method="post" class="signup-form">
            {% csrf_token %} 
            {{ form.as_p }}
            <button class="signup-btn" type="submit">회원가입</button>
        </form>
    </div>
</body>
</html>
